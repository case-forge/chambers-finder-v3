<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact · Chambers Finder</title>
  <meta name="description" content="Send a correction, suggest a chambers, or get in touch with the Chambers Finder team.">
  <link rel="canonical" href="https://caseforge.uk/contact">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://caseforge.uk/contact">
  <meta property="og:title" content="Contact · Chambers Finder">
  <meta property="og:description" content="Send a correction, suggest a chambers, or get in touch with the Chambers Finder team.">
  <meta property="og:image" content="https://caseforge.uk/img/caseforge-logo.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Contact · Chambers Finder">
  <meta name="twitter:description" content="Send a correction, suggest a chambers, or get in touch with the Chambers Finder team.">
  <meta name="twitter:image" content="https://caseforge.uk/img/caseforge-logo.png">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f0ebe1">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0e1014">
  <link rel="icon" type="image/x-icon" href="/img/caseforge-favicon.ico">
  <link rel="apple-touch-icon" href="/img/caseforge-logo.png">
  <link rel="stylesheet" href="/css/fonts.css">
  <link rel="stylesheet" href="/css/base.css">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <!-- Prevent flash of wrong theme -->
  <script src="/js/theme-init.js"></script>
  <script src="/js/theme-toggle.js" defer></script>
  <link rel="stylesheet" href="/css/contact.css">

</head>
<body>
  <div class="shell">

    <header class="site-header">
      <a href="/" class="header-logo" title="Back to Chambers Finder">
        <img src="/img/caseforge-logo.png" alt="CaseForge" width="44" height="44">
        <span class="header-logo-text">Case<span>Forge</span></span>
      </a>
      <div class="theme-toggle" role="group" aria-label="Colour theme">
        <button class="theme-btn" data-t="light" title="Light mode" aria-pressed="false">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button class="theme-btn" data-t="auto" title="Follow device" aria-pressed="false">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/></svg>
        </button>
        <button class="theme-btn" data-t="dark" title="Dark mode" aria-pressed="false">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <h1>Contact</h1>
    <p class="intro">Send a correction, suggest a chambers, or get in touch.</p>

    <div class="form-card">
      <form id="contact-form" action="/api/contact" method="POST" novalidate>

        <div class="field">
          <label for="name">Your name</label>
          <input type="text" id="name" name="name" placeholder="First and last name" autocomplete="name" maxlength="80" required>
          <p class="field-error" id="name-error" aria-live="polite"></p>
        </div>

        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" maxlength="100" required>
          <p class="field-error" id="email-error" aria-live="polite"></p>
        </div>

        <div class="field">
          <label for="type">Type of message</label>
          <select id="type" name="type" required>
            <option value="" disabled selected>Select a type…</option>
            <option value="correction">Data correction</option>
            <option value="chambers-missing">Chambers to add</option>
            <option value="suggestion">Suggestion or feature request</option>
            <option value="general">General enquiry</option>
          </select>
          <p class="field-error" id="type-error" aria-live="polite"></p>
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Tell us what should be updated…" maxlength="1000" required></textarea>
          <p class="field-error" id="message-error" aria-live="polite"></p>
          <p class="char-hint"><span id="char-count">0</span> / 1000</p>
        </div>

        <div class="turnstile-wrap">
          <div class="cf-turnstile"
               data-sitekey="0x4AAAAAACyz9Y6NhuDE1fDx"
               data-theme="auto">
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">Send message</button>
        <div class="form-error" id="form-error"></div>

      </form>
    </div>

    <footer class="site-footer">
      <span class="footer-links"><a href="/">Chambers Finder</a> &middot; <a href="/contact">Contact</a> &middot; <a href="/privacy">Privacy</a></span>
      <span>Built by <a class="caseforge-link" href="https://github.com/case-forge" target="_blank" rel="noopener noreferrer">CaseForge</a> &middot; &copy; 2026 &middot; All rights reserved</span>
    </footer>

  </div>

  <script src="/js/contact.js" defer></script>
</body>
</html>
